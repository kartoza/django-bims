#
# MkDocs configuration for Django BIMS documentation
#
# Made with love by Kartoza | https://kartoza.com

site_name: Django BIMS Documentation
site_url: https://kartoza.github.io/django-bims/
site_author: Kartoza
site_description: >-
  Comprehensive documentation for Django BIMS - Biodiversity Information
  Management System. Developer guides, API reference, deployment instructions,
  and more.

repo_name: kartoza/django-bims
repo_url: https://github.com/kartoza/django-bims
edit_uri: edit/main/mkdocs/

copyright: |
  Made with &hearts; by <a href="https://kartoza.com">Kartoza</a> |
  <a href="https://github.com/sponsors/kartoza">Donate!</a> |
  <a href="https://github.com/kartoza/django-bims">GitHub</a>

theme:
  name: material
  custom_dir: mkdocs/overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
  - mermaid2

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kartoza/django-bims
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/kartaborishov
  generator: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: kartoza
      repo: django-bims
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

