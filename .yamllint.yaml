# YAML lint configuration for Django BIMS

extends: default

ignore: |
  .venv/
  venv/
  node_modules/
  static/
  media/
  .git/

rules:
  document-end: disable
  document-start: disable
  line-length:
    max: 200
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
  comments:
    min-spaces-from-content: 1
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
  colons:
    max-spaces-before: 0
    max-spaces-after: -1
  commas:
    max-spaces-before: 0
    min-spaces-after: 1
    max-spaces-after: 1
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: true
  key-duplicates: enable
  new-line-at-end-of-file: enable
  trailing-spaces: enable
